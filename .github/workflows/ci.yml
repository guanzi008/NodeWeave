name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Verify formatting
        run: |
          test -z "$(gofmt -l services/controlplane/cmd services/controlplane/internal clients/linux-cli clients/linux-agent packages/contracts/go packages/runtime/go)"

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Smoke test
        run: bash scripts/e2e_smoke.sh

      - name: Build control plane image
        run: docker build -f services/controlplane/Dockerfile -t aaa-controlplane .
